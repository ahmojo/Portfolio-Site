# Production compose for Oracle E2.1 Micro (or A1.Flex).
# Cloudflare proxy terminates public HTTPS, so the app only needs to listen
# on plain HTTP port 80 — no Caddy, no Let's Encrypt, one process.
#
# Binding host port 80 requires root (or CAP_NET_BIND_SERVICE). Run
# `sudo docker compose up -d` — see ../scripts/setup-vm.sh.
services:
  api:
    build:
      context: ..          # repo root, so Dockerfile can COPY the site too
      dockerfile: backend/Dockerfile
    container_name: portfolio-api
    ports:
      - "80:8000"          # Cloudflare connects here on port 80
    volumes:
      - ./data:/app/backend/data       # persist sqlite db
      - ./uploads:/app/uploads         # persist uploaded files
    env_file:
      - path: .env
        required: true
    environment:
      PORTFOLIO_ENV: production
      PORTFOLIO_SECURE_COOKIES: "true"
      PORTFOLIO_EXPOSE_DOCS: "false"
      PORTFOLIO_ALLOWED_ORIGINS: '["https://ahmet-portfolio.ch","https://www.ahmet-portfolio.ch"]'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # OOM safety net on a 1 GB RAM VM: cap the container so the OS + Docker
    # daemon + SSH keep breathing room. The app idles at ~45 MB, peaks well
    # under 200 MB; 512 MB is a generous ceiling.
    mem_limit: 512m
    memswap_limit: 1g      # may swap up to 512 MB extra if a swapfile exists
