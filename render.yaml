# Render Blueprint — portfolio backend (free tier)
# Deploy: push to GitHub, then create a new service from this blueprint at
# https://dashboard.render.com/blueprints  (or "New +" -> Blueprint)
#
# IMPORTANT (free tier):
#   - The instance sleeps after 15 min idle and wakes on the next request (~50s).
#   - The filesystem is EPHEMERAL: the SQLite db wipes on every restart/sleep.
#     Use GET /api/backup (from /admin) to download your data regularly, or
#     upgrade to a paid instance + disk for persistence.
#
# Environment variables to set in the Render dashboard:
#   PORTFOLIO_ADMIN_PASSWORD = <your-strong-password>   (NOT 'admin')
#   PORTFOLIO_GITHUB_USER    = ahmojo
#   PORTFOLIO_SESSION_SECRET = <any random 40+ char string>

services:
  - type: web
    name: portfolio-api
    runtime: docker
    plan: free                 # bump to 'standard' for no-sleep + persistent disk
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PORTFOLIO_ADMIN_PASSWORD
        sync: false            # set in dashboard (secret)
      - key: PORTFOLIO_GITHUB_USER
        value: ahmojo
      - key: PORTFOLIO_SESSION_SECRET
        sync: false            # set in dashboard (secret)
