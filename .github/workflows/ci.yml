name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Python, health, audit, and Docker
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall -q backend/app backend/tests

      - name: Install test dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run FastAPI health smoke test
        working-directory: backend
        run: python -m pytest -q tests

      - name: Audit Python dependencies
        run: python -m pip_audit -r backend/requirements.txt

      - name: Build production Docker image
        run: docker build --file backend/Dockerfile --tag portfolio-site:ci .
